apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: dgraph
  namespace: dgraph
spec:
  interval: 5m
  chart:
    spec:
      chart: dgraph
      version: "25.0.0-preview6"
      sourceRef:
        kind: HelmRepository
        name: dgraph
        namespace: dgraph
  values:
    alpha:
      persistence:
        enabled: true
        size: 5Gi
        storageClass: longhorn
    zero:
      persistence:
        enabled: true
        size: 5Gi
        storageClass: longhorn

