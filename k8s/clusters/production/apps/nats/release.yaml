apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: nats
  namespace: nats
spec:
  interval: 5m
  chart:
    spec:
      chart: nats
      version: "2.12.5"
      sourceRef:
        kind: HelmRepository
        name: nats
        namespace: nats
  values:
    nats:
      jetstream:
        enabled: true
        fileStore:
          enabled: true
          pvc:
            enabled: true
            size: 4Gi
            storageClassName: longhorn

