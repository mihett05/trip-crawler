apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: "40.2.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
  values:
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesGateway:
        enabled: true

    ports:
      web:
        port: 8081
        hostPort: 8081
        exposedPort: 8081
      websecure:
        port: 8443
        hostPort: 8443
        exposedPort: 8443

    service:
      enabled: false
    gateway:
      enabled: false

    api:
      dashboard: true
      insecure: true

