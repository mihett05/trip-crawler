apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-traces
  namespace: observability
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-traces-single
      version: "0.0.7"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: observability
  values:
    server:
      retentionPeriod: "30"
      persistentVolume:
        enabled: true
        size: 2Gi
        storageClassName: longhorn
    service:
      type: ClusterIP

