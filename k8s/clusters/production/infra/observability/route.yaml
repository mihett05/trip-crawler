apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
spec:
  parentRefs:
    - name: apps-gateway
      namespace: traefik
  hostnames:
    - "grafana.letsgotrip.store"
  rules:
    - backendRefs:
        - name: victoria-k8s-stack-grafana
          port: 80

