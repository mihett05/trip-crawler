name: Test, Build, Push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  SERVICE_IMAGE_NAME: ${{ github.repository }}/service
  SCHEDULER_IMAGE_NAME: ${{ github.repository }}/scheduler
  WORKER_IMAGE_NAME: ${{ github.repository }}/worker
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend
  CHART_PATH: chart

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'backend/go.mod'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify compilation (optional)
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/service
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/scheduler
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/worker

  docker-service:
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/service.dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.SERVICE_IMAGE_NAME }}:${{ github.sha }}

  docker-scheduler:
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push scheduler image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/scheduler.dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}:${{ github.sha }}

  docker-worker:
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/worker.dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}

  docker-frontend:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

  helm-chart:
    needs:
      - docker-service
      - docker-scheduler
      - docker-worker
      - docker-frontend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Update image tags in Helm values.yaml
        run: |
          yq -i '.service.image.tag = "${{ github.sha }}"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.worker.image.tag = "${{ github.sha }}"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.frontend.image.tag = "${{ github.sha }}"' ${{ env.CHART_PATH }}/values.yaml
          # yq -i '.scheduler.image.tag = "${{ github.sha }}"' ${{ env.CHART_PATH }}/values.yaml

      - name: Package Helm chart
        run: |
          helm package ${{ env.CHART_PATH }} \
            --app-version ${{ github.sha }} \
            --destination /tmp/helm-package

      - name: Log in to GHCR (for Helm OCI push)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/helm-package/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts