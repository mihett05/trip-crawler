/v1/routes:
  post:
    tags:
      - Routes
    summary: Create a new travel route
    description: Creates a new travel route with specified points and duration parameters
    operationId: createRoute
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/CreateRouteRequest.yaml"
          example:
            points:
              - Rome
              - Paris
              - London
            start_date: "2024-01-15"
            duration_min_days: 7
            duration_max_days: 14
    responses:
      "200":
        description: Route created successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas/CreateRouteResponse.yaml"
            example:
              points:
                - name: Rome
                  start_timestamp: 1705276800
                  end_timestamp: 1705622400
                  route_details: Details about Rome stay
                - name: Paris
                  start_timestamp: 1705622400
                  end_timestamp: 1706227200
                  route_details: Details about Paris stay
      "400":
        description: Bad request - invalid input parameters
        content:
          application/json:
            schema:
              $ref: "../components/schemas/Error.yaml"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: "../components/schemas/Error.yaml"
