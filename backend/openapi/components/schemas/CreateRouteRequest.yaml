type: object
required:
  - points
  - start_date
  - duration_min_days
properties:
  points:
    type: array
    items:
      type: string
    description: List of destination points for the route
    minItems: 1
    example: ["Rome", "Paris", "London"]
  start_date:
    type: string
    format: date
    description: Start date for the trip in YYYY-MM-DD format
    example: "2024-01-15"
  duration_min_days:
    type: integer
    minimum: 1
    description: Minimum duration of the trip in days
    example: 7
  duration_max_days:
    type: integer
    minimum: 1
    description: Maximum duration of the trip in days (optional)
    example: 14
    nullable: true
