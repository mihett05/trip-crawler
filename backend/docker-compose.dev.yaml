include:
  - docker-compose.yaml
services:
  service:
    build:
      context: .
      dockerfile: dev.dockerfile
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    env_file:
      - configs/.env.service.docker
    ports:
      - "8080:8080"
      - "40000:40000"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

volumes:
  go-mod-cache:
  go-build-cache: