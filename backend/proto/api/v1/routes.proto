syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/mihett05/trip-crawler/gen/api/v1";

message CreateRouteRequest {
  repeated string points = 1;
  string start_date = 2;
  int64 duration_min_days = 3 [(buf.validate.field).int64 = { gt: 0 }];
  optional int64 duration_max_days = 4;
}

message RoutePoint {
  string name = 1;
  int64 start_timestamp = 2;
  int64 end_timestamp = 3;
  string route_details = 4;
}

message CreateRouteResponse {
  repeated RoutePoint points = 1;
}