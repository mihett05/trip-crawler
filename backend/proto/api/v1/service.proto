syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";

import "api/v1/routes.proto";

option go_package = "github.com/mihett05/trip-crawler/gen/api/v1";

service TripCrawlerService {
  rpc CreateRoute(api.v1.CreateRouteRequest) returns (api.v1.CreateRouteResponse) {
    option (google.api.http) = {
      post: "/v1/routes",
      body: "*",
    };
  }
}


